name: jinma_jewelry_system

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost}
      APP_ALLOWED_ORIGIN_REGEX: ${APP_ALLOWED_ORIGIN_REGEX:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-flux}
      AI_UPSTREAM_PLATFORM: ${AI_UPSTREAM_PLATFORM:-apiyi}
      AI_MAX_FUSION_IMAGES: ${AI_MAX_FUSION_IMAGES:-6}
      APIYI_API_KEY: ${APIYI_API_KEY:-}
      APIYI_BASE_URL: ${APIYI_BASE_URL:-https://api.apiyi.com}
      APIYI_OPENAI_BASE_URL: ${APIYI_OPENAI_BASE_URL:-https://api.apiyi.com/v1}
      APIYI_GEMINI_BASE_URL: ${APIYI_GEMINI_BASE_URL:-https://api.apiyi.com/v1beta}
      TTAPI_API_KEY: ${TTAPI_API_KEY:-}
      TTAPI_FLUX_BASE_URL: ${TTAPI_FLUX_BASE_URL:-https://api.ttapi.io}
      TTAPI_OPENAI_BASE_URL: ${TTAPI_OPENAI_BASE_URL:-https://api.ttapi.org}
      TTAPI_TIMEOUT_SECONDS: ${TTAPI_TIMEOUT_SECONDS:-120}
      TTAPI_POLL_INTERVAL_SECONDS: ${TTAPI_POLL_INTERVAL_SECONDS:-2.5}
      TTAPI_POLL_ATTEMPTS: ${TTAPI_POLL_ATTEMPTS:-24}
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_EXPIRE_HOURS: ${AUTH_TOKEN_EXPIRE_HOURS:-24}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-jinma_auth_token}
      ROOT_USER_ID: ${ROOT_USER_ID:-00000000-0000-0000-0000-000000000001}
      ROOT_USERNAME: ${ROOT_USERNAME:-root}
      ROOT_DISPLAY_NAME: ${ROOT_DISPLAY_NAME:-系统管理员}
      ROOT_EMAIL: ${ROOT_EMAIL:-root@example.com}
      ROOT_DEFAULT_PASSWORD: ${ROOT_DEFAULT_PASSWORD:-root123456}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      QUEUE_REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: ${QUEUE_NAME:-jinma-ai}
      QUEUE_JOB_TIMEOUT_SECONDS: ${QUEUE_JOB_TIMEOUT_SECONDS:-900}
      QUEUE_RESULT_TTL_SECONDS: ${QUEUE_RESULT_TTL_SECONDS:-3600}
      QUEUE_USER_MAX_ACTIVE_JOBS: ${QUEUE_USER_MAX_ACTIVE_JOBS:-1}
      QUEUE_ROOT_MAX_ACTIVE_JOBS: ${QUEUE_ROOT_MAX_ACTIVE_JOBS:-3}
      CACHE_JOB_STATUS_TTL_SECONDS: ${CACHE_JOB_STATUS_TTL_SECONDS:-21600}
      CACHE_JOB_DEDUPE_TTL_SECONDS: ${CACHE_JOB_DEDUPE_TTL_SECONDS:-120}
      CACHE_MODEL_CATALOG_TTL_SECONDS: ${CACHE_MODEL_CATALOG_TTL_SECONDS:-300}
      CACHE_AUTH_ME_TTL_SECONDS: ${CACHE_AUTH_ME_TTL_SECONDS:-60}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - sh
      - -lc
      - |
        python /app/deploy/docker/wait_for_tcp.py mysql 3306 60 &&
        python /app/deploy/docker/wait_for_tcp.py redis 6379 60 &&
        gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-2}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost}
      APP_ALLOWED_ORIGIN_REGEX: ${APP_ALLOWED_ORIGIN_REGEX:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-flux}
      AI_UPSTREAM_PLATFORM: ${AI_UPSTREAM_PLATFORM:-apiyi}
      AI_MAX_FUSION_IMAGES: ${AI_MAX_FUSION_IMAGES:-6}
      APIYI_API_KEY: ${APIYI_API_KEY:-}
      APIYI_BASE_URL: ${APIYI_BASE_URL:-https://api.apiyi.com}
      APIYI_OPENAI_BASE_URL: ${APIYI_OPENAI_BASE_URL:-https://api.apiyi.com/v1}
      APIYI_GEMINI_BASE_URL: ${APIYI_GEMINI_BASE_URL:-https://api.apiyi.com/v1beta}
      TTAPI_API_KEY: ${TTAPI_API_KEY:-}
      TTAPI_FLUX_BASE_URL: ${TTAPI_FLUX_BASE_URL:-https://api.ttapi.io}
      TTAPI_OPENAI_BASE_URL: ${TTAPI_OPENAI_BASE_URL:-https://api.ttapi.org}
      TTAPI_TIMEOUT_SECONDS: ${TTAPI_TIMEOUT_SECONDS:-120}
      TTAPI_POLL_INTERVAL_SECONDS: ${TTAPI_POLL_INTERVAL_SECONDS:-2.5}
      TTAPI_POLL_ATTEMPTS: ${TTAPI_POLL_ATTEMPTS:-24}
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-3600}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_EXPIRE_HOURS: ${AUTH_TOKEN_EXPIRE_HOURS:-24}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-jinma_auth_token}
      ROOT_USER_ID: ${ROOT_USER_ID:-00000000-0000-0000-0000-000000000001}
      ROOT_USERNAME: ${ROOT_USERNAME:-root}
      ROOT_DISPLAY_NAME: ${ROOT_DISPLAY_NAME:-系统管理员}
      ROOT_EMAIL: ${ROOT_EMAIL:-root@example.com}
      ROOT_DEFAULT_PASSWORD: ${ROOT_DEFAULT_PASSWORD:-root123456}
      QUEUE_REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: ${QUEUE_NAME:-jinma-ai}
      QUEUE_JOB_TIMEOUT_SECONDS: ${QUEUE_JOB_TIMEOUT_SECONDS:-900}
      QUEUE_RESULT_TTL_SECONDS: ${QUEUE_RESULT_TTL_SECONDS:-3600}
      QUEUE_USER_MAX_ACTIVE_JOBS: ${QUEUE_USER_MAX_ACTIVE_JOBS:-1}
      QUEUE_ROOT_MAX_ACTIVE_JOBS: ${QUEUE_ROOT_MAX_ACTIVE_JOBS:-3}
      CACHE_JOB_STATUS_TTL_SECONDS: ${CACHE_JOB_STATUS_TTL_SECONDS:-21600}
      CACHE_JOB_DEDUPE_TTL_SECONDS: ${CACHE_JOB_DEDUPE_TTL_SECONDS:-120}
      CACHE_MODEL_CATALOG_TTL_SECONDS: ${CACHE_MODEL_CATALOG_TTL_SECONDS:-300}
      CACHE_AUTH_ME_TTL_SECONDS: ${CACHE_AUTH_ME_TTL_SECONDS:-60}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - sh
      - -lc
      - |
        python /app/deploy/docker/wait_for_tcp.py mysql 3306 60 &&
        python /app/deploy/docker/wait_for_tcp.py redis 6379 60 &&
        python -m app.worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/backend/data

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
  backend_data:
